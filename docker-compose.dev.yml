services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestratorr-backend-dev
    restart: unless-stopped
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - FASTAPI_RELOAD=true  # Enable hot reload for development
      - LOG_LEVEL=DEBUG      # More verbose logging
    env_file:
      - .env
    volumes:
      # Mount source code for hot reload
      - ./backend:/app/backend
      - /app/backend/__pycache__  # Exclude pycache from mount
    ports:
      - "8000:8000"
    networks:
      - orchestratorr-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_API_BASE: ""
        VITE_ADAPTER: auto
        VITE_RADARR_URL: ${RADARR_URL:-http://localhost:7878}
        VITE_SONARR_URL: ${SONARR_URL:-http://localhost:8989}
        VITE_LIDARR_URL: ${LIDARR_URL:-http://localhost:8686}
        VITE_PROWLARR_URL: ${PROWLARR_URL:-http://localhost:9696}
    container_name: orchestratorr-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      # Mount source for hot reload
      - ./frontend:/app
      - /app/node_modules  # Exclude node_modules from mount
    ports:
      - "5173:5173"  # Vite dev server port
      - "80:80"      # Nginx port (optional for production preview)
    networks:
      - orchestratorr-net
    environment:
      - VITE_API_BASE=http://localhost:8000
    command: npm run dev

networks:
  orchestratorr-net:
    driver: bridge
